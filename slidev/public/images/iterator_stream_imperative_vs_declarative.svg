<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(230,232,236,0.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <style>
    .txtMain { fill: #f6f5ef; font: 600 14px system-ui, -apple-system, Segoe UI, sans-serif; }
    .txtSub { fill: #c8c6ba; font: 400 12px system-ui, -apple-system, Segoe UI, sans-serif; }
    .boxText { fill: #d4d2c7; font: 600 12px system-ui, -apple-system, Segoe UI, sans-serif; }
    .line { stroke: rgba(230,232,236,0.56); stroke-width: 1.2; }
    .fade { opacity: 0; transform: translateY(7px); }
    @keyframes show {
      from { opacity: 0; transform: translateY(7px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #impLabel { animation: show .28s ease-out .14s forwards; }
    #impInput { animation: show .26s ease-out .52s forwards; }
    #impA1 { animation: show .20s ease-out .84s forwards; }
    #impStep1 { animation: show .24s ease-out 1.10s forwards; }
    #impA2 { animation: show .20s ease-out 1.36s forwards; }
    #impStep2 { animation: show .24s ease-out 1.62s forwards; }
    #impA3 { animation: show .20s ease-out 1.88s forwards; }
    #impStep3 { animation: show .24s ease-out 2.14s forwards; }
    #decLabel { animation: show .28s ease-out 2.52s forwards; }
    #divider { animation: show .20s ease-out 2.66s forwards; }
    #decInput { animation: show .26s ease-out 3.00s forwards; }
    #decA1 { animation: show .20s ease-out 3.34s forwards; }
    #decStep1 { animation: show .24s ease-out 3.60s forwards; }
    #decA2 { animation: show .20s ease-out 3.84s forwards; }
    #decStep2 { animation: show .24s ease-out 4.08s forwards; }
    #decA3 { animation: show .20s ease-out 4.34s forwards; }
    #decStep3 { animation: show .24s ease-out 4.58s forwards; }
    #decA4 { animation: show .20s ease-out 4.82s forwards; }
    #decStep4 { animation: show .24s ease-out 5.06s forwards; }
    #decNote { animation: show .28s ease-out 6.02s forwards; }
  </style>

  <rect x="0" y="0" width="680" height="400" rx="10" fill="rgba(12,16,24,0.96)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text id="impLabel" class="txtMain fade" x="160" y="28" text-anchor="middle">Imperative (for-loop)</text>
  <text id="decLabel" class="txtMain fade" x="510" y="28" text-anchor="middle">Declarative (Stream API)</text>
  <line id="divider" class="fade" x1="340" y1="14" x2="340" y2="386" stroke="rgba(222,220,209,0.18)" stroke-width="1" stroke-dasharray="4 4" />

  <g id="impInput" class="fade">
    <rect x="70" y="44" width="180" height="38" rx="7" fill="#454540" stroke="#b8b5aa" stroke-width="0.8" />
    <text class="boxText" x="160" y="67" text-anchor="middle">List&lt;OrderItem&gt;</text>
  </g>
  <line id="impA1" class="fade line" x1="160" y1="82" x2="160" y2="102" marker-end="url(#arrow)" />
  <g id="impStep1" class="fade">
    <rect x="70" y="104" width="180" height="38" rx="7" fill="#633806" stroke="#ef9f27" stroke-width="0.8" />
    <text class="boxText" x="160" y="127" text-anchor="middle">total = ZERO</text>
  </g>
  <line id="impA2" class="fade line" x1="160" y1="142" x2="160" y2="162" marker-end="url(#arrow)" />
  <g id="impStep2" class="fade">
    <rect x="70" y="164" width="180" height="44" rx="7" fill="#6f2d17" stroke="#ef9a7b" stroke-width="0.8" />
    <text class="boxText" x="160" y="185" text-anchor="middle">for (item : items)</text>
    <text class="txtSub" x="160" y="201" text-anchor="middle">manuel kontrol akisi</text>
  </g>
  <line id="impA3" class="fade line" x1="160" y1="208" x2="160" y2="228" marker-end="url(#arrow)" />
  <g id="impStep3" class="fade">
    <rect x="70" y="230" width="180" height="82" rx="7" fill="#792020" stroke="#f09595" stroke-width="0.8" />
    <text class="txtSub" x="160" y="252" text-anchor="middle" fill="#f09595">if (category == BOOK)</text>
    <text class="txtSub" x="160" y="270" text-anchor="middle" fill="#f09595">line = price * qty</text>
    <text class="txtSub" x="160" y="288" text-anchor="middle" fill="#f09595">total = total + line</text>
  </g>

  <g id="decInput" class="fade">
    <rect x="420" y="44" width="180" height="38" rx="7" fill="#454540" stroke="#b8b5aa" stroke-width="0.8" />
    <text class="boxText" x="510" y="67" text-anchor="middle">List&lt;OrderItem&gt;</text>
  </g>
  <line id="decA1" class="fade line" x1="510" y1="82" x2="510" y2="102" marker-end="url(#arrow)" />
  <g id="decStep1" class="fade">
    <rect x="420" y="104" width="180" height="36" rx="7" fill="#085040" stroke="#5dcaa5" stroke-width="0.8" />
    <text class="boxText" x="510" y="126" text-anchor="middle">.stream()</text>
  </g>
  <line id="decA2" class="fade line" x1="510" y1="140" x2="510" y2="160" marker-end="url(#arrow)" />
  <g id="decStep2" class="fade">
    <rect x="420" y="162" width="180" height="36" rx="7" fill="#085040" stroke="#5dcaa5" stroke-width="0.8" />
    <text class="boxText" x="510" y="184" text-anchor="middle">.filter(BOOK)</text>
  </g>
  <line id="decA3" class="fade line" x1="510" y1="198" x2="510" y2="218" marker-end="url(#arrow)" />
  <g id="decStep3" class="fade">
    <rect x="420" y="220" width="180" height="36" rx="7" fill="#085040" stroke="#5dcaa5" stroke-width="0.8" />
    <text class="boxText" x="510" y="242" text-anchor="middle">.map(price * qty)</text>
  </g>
  <line id="decA4" class="fade line" x1="510" y1="256" x2="510" y2="276" marker-end="url(#arrow)" />
  <g id="decStep4" class="fade">
    <rect x="420" y="278" width="180" height="36" rx="7" fill="#28500a" stroke="#97c459" stroke-width="0.8" />
    <text class="boxText" x="510" y="300" text-anchor="middle">.reduce(ZERO, add)</text>
  </g>
  <g id="decNote" class="fade">
    <rect x="384" y="330" width="252" height="38" rx="7" fill="#3c3488" stroke="#afa9ec" stroke-width="0.8" />
    <text class="txtSub" x="510" y="354" text-anchor="middle">Niyet acik: filtrele, donustur, topla</text>
  </g>
</svg>
